      place-items: center;

      padding: 2rem;
    }
    .card {
      max-width: 640px;
      background: #11150f;

    }
    p {
      color: #b4ae9b;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      background: #c89b3c;
      color: #121212;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
