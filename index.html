<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hutch & Co. — KC Metro's Go-To Handyman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0d07;
–bg2: #0f1309;
–blue: #c49a3c;
–blue-bright: #e2b24a;
–text: #d4d3be;
–text-dim: #5a5e4a;
–gold: #c49a3c;
–grid: rgba(255,255,255,0.03);
}

html { scroll-behavior: smooth; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Barlow Condensed’, sans-serif;
overflow-x: hidden;
}

/* ── GRID OVERLAY ── */
body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(var(–grid) 1px, transparent 1px),
linear-gradient(90deg, var(–grid) 1px, transparent 1px);
background-size: 80px 80px;
pointer-events: none;
z-index: 0;
}

/* ── NAV ── */
nav {
position: fixed; top: 0; left: 0; right: 0;
z-index: 100;
display: flex; align-items: center; justify-content: space-between;
padding: 0 3rem;
height: 68px;ackground: rgba(10,13,7,0.92);
backdrop-filter: blur(12px);
border-bottom: 1px solid rgba(255,255,255,0.04);
}

.logo {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 600;
font-size: 1.35rem;
letter-spacing: 0.15em;
color: var(–blue-bright);
text-transform: uppercase;
text-decoration: none;
}

.nav-links {
display: flex; gap: 2.5rem; align-items: center;
list-style: none;
}

.nav-links a {
font-size: 0.72rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–text);
text-decoration: none;
transition: color 0.2s;
}
.nav-links a:hover { color: var(–blue-bright); }

.nav-cta {
font-size: 0.72rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–blue-bright) !important;
border: 1px solid var(–blue);
padding: 0.5rem 1.2rem;
transition: background 0.2s, color 0.2s !important;
}
.nav-cta:hover { background: var(–blue); color: #fff !important; }

/* ── HERO ── */
.hero {
position: relative;
min-height: 100vh;
display: flex; flex-direction: column; justify-content: flex-end;
padding: 0 3.5rem 5rem;
overflow: hidden;
}

/* radial glow right side */
.hero::after {
content: ‘’;
position: absolute;
right: -10%;
top: 15%;
width: 55%;
height: 70%;ackground: radial-gradient(ellipse at center, rgba(196,154,60,0.1) 0%, transparent 65%);
pointer-events: none;
z-index: 1;
}

.hero-eyebrow {
font-size: 0.72rem;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(–text-dim);
margin-bottom: 1.2rem;
opacity: 0;
animation: fadeUp 0.8s 0.2s forwards;
}

.hero-headline {
font-family: ‘Playfair Display’, serif;
font-weight: 900;
font-style: italic;
font-size: clamp(5rem, 13vw, 14rem);
line-height: 0.92;
color: #e8e6d4;
-webkit-text-stroke: 0px;
letter-spacing: -0.01em;
position: relative;
z-index: 1;
}

.hero-headline span {
display: block;
opacity: 0;
}
.hero-headline span:nth-child(1) { animation: fadeUp 0.9s 0.35s forwards; }
.hero-headline span:nth-child(2) { animation: fadeUp 0.9s 0.5s forwards; }
.hero-headline span:nth-child(3) { animation: fadeUp 0.9s 0.65s forwards; }

.hero-sub {
margin-top: 2.5rem;
display: flex; gap: 4rem; align-items: flex-start;
opacity: 0;
animation: fadeUp 0.8s 0.85s forwards;
}

.hero-desc {
max-width: 360px;
font-size: 1rem;
font-weight: 300;
letter-spacing: 0.04em;
line-height: 1.7;
color: var(–text-dim);
}

.hero-actions { display: flex; gap: 1rem; align-items: center; padding-top: 0.3rem; }

.btn-primary {
background: var(–blue);
color: #fff;
padding: 1rem 2.2rem;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.78rem;
letter-spacing: 0.22em;
text-transform: uppercase;
border: none; cursor: pointer;
text-decoration: none;
transition: background 0.2s, transform 0.15s;
display: inline-block;
}
.btn-primary:hover { background: var(–blue-bright); transform: translateY(-2px); }

.btn-ghost {
color: var(–text-dim);
font-size: 0.78rem;
letter-spacing: 0.18em;
text-transform: uppercase;
text-decoration: none;
border-bottom: 1px solid var(–text-dim);
padding-bottom: 2px;
transition: color 0.2s, border-color 0.2s;
}
.btn-ghost:hover { color: var(–text); border-color: var(–text); }

/* ── MARQUEE ── */
.marquee-wrap {
border-top: 1px solid rgba(255,255,255,0.05);
border-bottom: 1px solid rgba(255,255,255,0.05);
overflow: hidden;
padding: 1rem 0;ackground: rgba(196,154,60,0.04);
}
.marquee-track {
display: flex; gap: 3rem;
white-space: nowrap;
animation: marquee 25s linear infinite;
}
.marquee-item {
font-size: 0.68rem;
letter-spacing: 0.28em;
text-transform: uppercase;
color: var(–text-dim);
flex-shrink: 0;
}
.marquee-dot {
color: var(–blue);
margin-right: 3rem;
}
@keyframes marquee {
from { transform: translateX(0); }
to { transform: translateX(-50%); }
}

/* ── SERVICES ── */
section { position: relative; z-index: 1; }

.services {
padding: 7rem 3.5rem;
border-bottom: 1px solid rgba(255,255,255,0.04);
}

.section-label {
font-size: 0.68rem;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(–blue);
margin-bottom: 3rem;
display: flex; align-items: center; gap: 1rem;
}
.section-label::after {
content: ‘’;
display: block;
height: 1px;
width: 60px;ackground: var(–blue);
opacity: 0.4;
}

.services-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 0;
border: 1px solid rgba(255,255,255,0.05);
}

.service-card {
padding: 2.5rem 2rem;
border-right: 1px solid rgba(255,255,255,0.05);
border-bottom: 1px solid rgba(255,255,255,0.05);
transition: background 0.25s;
cursor: default;
}
.service-card:nth-child(3n) { border-right: none; }
.service-card:nth-child(n+4) { border-bottom: none; }
.service-card:hover { background: rgba(196,154,60,0.05); }

.service-num {
font-size: 0.65rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–text);
}
.service-title {
font-size: 0.92rem;
font-weight: 500;
letter-spacing: 0.1em;
}

.service-desc {
color: var(–text-dim);
font-size: 0.75rem;
letter-spacing: 0.03em;
line-height: 1.25;
}

footer {
position: relative;
background: var(–bg);
padding: 2rem 0;
}
footer p {
text-align: center;
color: var(–text);
font-size: 0.68rem;
line-height: 1.5;
}
</style>
</head>
<body>

<nav>
<a href="#" class="logo">Hutch & Co.</a>
<ul class="nav-links">
<li><a href="#services">Services</a></li>
<li><a href="#about">About</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
<a href="#" class="nav-cta">Get a Quote</a>
</nav>

<section class="hero">
<h1 class="hero-eyebrow">Welcome to Hutch & Co.</h1>
<h2 class="hero-headline">
  <span>Your Trusted Handyman</span>
  <span>In Kansas City</span>
  <span>And Beyond</span>
</h2>
<p class="hero-desc">We offer a wide range of home repair and maintenance services to meet all your needs.</p>
<div class="hero-actions">
<a href="#" class="btn-primary">View Services</a>
<a href="#" class="btn-ghost">Learn More</a>
</div>
</section>

<footer>
<p>&copy; 2026 Hutch & Co. All rights reserved.</p>
</footer>

</body>
</html>
